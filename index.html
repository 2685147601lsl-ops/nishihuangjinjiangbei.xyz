<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的网页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        .typing-container {
            text-align: center;
        }

        .typing {
            color: #12d640;
            font-size: 48px;
            font-weight: 700;
            border-right: 3px solid #12d640;
            padding-right: 10px;
            animation: blink 0.7s infinite;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        @keyframes blink {
            0%, 100% {
                border-color: #12d640;
            }
            50% {
                border-color: transparent;
            }
        }

        .intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #010e1b;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            animation: fadeOut 0.8s ease-in-out 2.8s forwards;
        }

        @keyframes fadeOut {
            0% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                visibility: hidden;
            }
        }

        .intro-svg {
            width: 200px;
            height: 200px;
        }

        .outer-circle {
            fill: none;
            stroke: #12d640;
            stroke-width: 3;
            stroke-dasharray: 283;
            stroke-dashoffset: 283;
            animation: drawOuter 1.5s ease-in-out 0.3s forwards;
        }

        .inner-shape {
            fill: none;
            stroke: #12d640;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 120;
            stroke-dashoffset: 120;
            animation: drawInner 1s ease-in-out 1.2s forwards;
        }

        .center-dot {
            fill: #12d640;
            opacity: 0;
            transform-origin: center;
            animation: appearDot 0.5s ease-in-out 2s forwards, pulse 1.5s ease-in-out 2.5s infinite;
        }

        @keyframes drawOuter {
            to {
                stroke-dashoffset: 0;
            }
        }

        @keyframes drawInner {
            to {
                stroke-dashoffset: 0;
            }
        }

        @keyframes appearDot {
            to {
                opacity: 1;
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.3);
            }
        }
    </style>
</head>
<body>
    <div class="intro-overlay">
        <svg class="intro-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <circle class="outer-circle" cx="50" cy="50" r="45"/>
            <path class="inner-shape" d="M 35 50 Q 50 35 65 50 Q 50 65 35 50"/>
            <circle class="center-dot" cx="50" cy="50" r="5"/>
        </svg>
    </div>

    <video class="video-background" autoplay muted loop playsinline>
        <source src="9 月 30 日 (1).mp4" type="video/mp4">
    </video>

    <div class="typing-container">
        <span class="typing"></span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>
    <script>
        var typed = new Typed('.typing', {
            strings: ["Coder", "Developer", "AI Enthusiast"],
            loop: true,
            typeSpeed: 65,
            backSpeed: 65,
            showCursor: false,
            cursorChar: ''
        });
    </script>
</body>
</html>
