<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> </title>
    <style>
        @import url('https://fonts.cdnfonts.com/css/general-sans');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'General Sans', 'Poppins', sans-serif;
            overflow: hidden;
        }

        /* 视频背景 */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -2;
        }

        .video-background video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 打字机特效 - 右下角（时间） */
        .typing-container {
            position: fixed;
            bottom: 50px;
            right: 50px;
            z-index: 10;
        }

        /* 打字机特效 - 左上角 */
        .typing-topleft-container {
            position: fixed;
            top: 50px;
            left: 50px;
            z-index: 10;
        }

        .typing,
        .typing-topleft {
            color: #ffffff;
            font-size: 56px;
            font-weight: 800;
            letter-spacing: 2px;
            text-shadow: 
                0 0 2px rgba(0, 0, 0, 0.15),
                0 0 4px rgba(0, 0, 0, 0.1),
                0 0 6px rgba(0, 0, 0, 0.08),
                0 0 8px rgba(0, 0, 0, 0.05),
                0 0 10px rgba(255, 255, 255, 0.8),
                0 0 20px rgba(255, 255, 255, 0.6),
                0 0 30px rgba(255, 255, 255, 0.4);
        }

        /* 打字机光标 - 白色细线 */
        .typed-cursor {
            color: #ffffff;
            font-size: 56px;
            font-weight: 800;
            animation: blink 0.7s infinite;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        @keyframes blink {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0;
            }
        }

        /* GSAP FLIP 开屏动画 */
        .intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .intro-content {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .intro-circle {
            position: absolute;
            border: 2px solid #dfdff2;
            border-radius: 50%;
            opacity: 0;
            box-shadow: 0 0 10px rgba(223, 223, 242, 0.3);
        }

        .circle-1 {
            width: 100px;
            height: 100px;
            border-color: rgba(223, 223, 242, 0.4);
            box-shadow: 0 0 8px rgba(223, 223, 242, 0.2);
        }

        .circle-2 {
            width: 160px;
            height: 160px;
            border-color: rgba(223, 223, 242, 0.7);
            box-shadow: 0 0 12px rgba(223, 223, 242, 0.4);
        }

        .circle-3 {
            width: 220px;
            height: 220px;
            border-color: rgba(223, 223, 242, 1);
            box-shadow: 0 0 15px rgba(223, 223, 242, 0.6);
        }

        .intro-text {
            position: absolute;
            color: #ffffff;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 8px;
            opacity: 0;
            transform: scale(0.8);
            z-index: 10;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8),
                         0 0 30px rgba(255, 255, 255, 0.5),
                         0 0 40px rgba(255, 255, 255, 0.3);
        }

        .intro-line {
            position: absolute;
            height: 2px;
            background: #dfdff2;
            width: 0;
        }

        .line-horizontal {
            width: 0;
            height: 2px;
        }

        .line-vertical {
            width: 2px;
            height: 0;
        }

        /* 网格背景 */
        .intro-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(223, 223, 242, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(223, 223, 242, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0;
        }
    </style>
</head>
<body>
    <!-- GSAP FLIP 开屏动画 -->
    <div class="intro-overlay" id="introOverlay">
        <div class="intro-grid"></div>
        <div class="intro-content">
            <div class="intro-circle circle-1"></div>
            <div class="intro-circle circle-2"></div>
            <div class="intro-circle circle-3"></div>
            <div class="intro-text">WELCOME</div>
        </div>
    </div>

    <!-- 视频背景 -->
    <div class="video-background">
        <video autoplay muted loop playsinline>
            <source src="background.mp4" type="video/mp4">
            您的浏览器不支持视频标签。
        </video>
    </div>

    <!-- 打字机特效 - 左上角 -->
    <div class="typing-topleft-container">
        <span class="typing-topleft"></span>
    </div>

    <!-- 打字机特效 - 右下角（时间） -->
    <div class="typing-container">
        <span class="typing"></span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script>
        // GSAP FLIP 开屏动画
        document.addEventListener('DOMContentLoaded', () => {
            const tl = gsap.timeline();

            // 1. 网格淡入
            tl.to('.intro-grid', {
                opacity: 1,
                duration: 0.5,
                ease: 'power2.out'
            })
            // 2. 圆圈依次展开（FLIP 效果）
            .to('.circle-1', {
                opacity: 1,
                scale: 1,
                duration: 0.4,
                ease: 'power2.out'
            }, 0.2)
            .to('.circle-2', {
                opacity: 1,
                scale: 1,
                duration: 0.4,
                ease: 'power2.out'
            }, 0.3)
            .to('.circle-3', {
                opacity: 1,
                scale: 1,
                duration: 0.4,
                ease: 'power2.out'
            }, 0.4)
            // 3. 文字出现
            .to('.intro-text', {
                opacity: 1,
                scale: 1,
                duration: 0.5,
                ease: 'back.out(1.7)'
            }, 0.6)
            // 4. 圆圈扩散消失
            .to('.circle-1', {
                scale: 3,
                opacity: 0,
                duration: 0.8,
                ease: 'power2.inOut'
            }, 1.5)
            .to('.circle-2', {
                scale: 2.5,
                opacity: 0,
                duration: 0.8,
                ease: 'power2.inOut'
            }, 1.5)
            .to('.circle-3', {
                scale: 2,
                opacity: 0,
                duration: 0.8,
                ease: 'power2.inOut'
            }, 1.5)
            // 5. 文字向上淡出
            .to('.intro-text', {
                y: -100,
                opacity: 0,
                duration: 0.6,
                ease: 'power2.in'
            }, 1.7)
            // 6. 网格向上移动并淡出
            .to('.intro-grid', {
                y: -100,
                opacity: 0,
                duration: 0.8,
                ease: 'power2.inOut'
            }, 1.7)
            // 7. 遮罩层边变淡边向上滑出
            .to('.intro-overlay', {
                y: '-100%',
                opacity: 0,
                duration: 1.2,
                ease: 'power4.inOut',
                onComplete: () => {
                    // 动画完成后启动打字机
                    startTyped();
                    startTypedLeft();
                }
            }, 2);
        });

        // 启动打字机特效 - 显示当前时间（右下角）
        function startTyped() {
            const typingElement = document.querySelector('.typing');
            
            // 格式化时间函数
            function formatTime() {
                const now = new Date();
                const hours = String(now.getHours()).padStart(2, '0');
                const minutes = String(now.getMinutes()).padStart(2, '0');
                const seconds = String(now.getSeconds()).padStart(2, '0');
                return { hours, minutes, seconds, full: `${hours}:${minutes}:${seconds}` };
            }
            
            // 首次显示时间
            let currentTime = formatTime();
            typingElement.textContent = currentTime.full;
            
            // 每秒更新时间
            setInterval(() => {
                const newTime = formatTime();
                
                // 比较各部分，只更新变化的部分
                if (newTime.seconds !== currentTime.seconds) {
                    // 秒变化 - 只更新秒部分
                    const secondsPos = 6; // 秒在字符串中的位置
                    typingElement.textContent = 
                        typingElement.textContent.substring(0, secondsPos) + newTime.seconds;
                }
                
                if (newTime.minutes !== currentTime.minutes) {
                    // 分变化 - 更新分和秒部分
                    const minutesPos = 3; // 分在字符串中的位置
                    typingElement.textContent = 
                        typingElement.textContent.substring(0, minutesPos) + newTime.minutes + ':' + newTime.seconds;
                }
                
                if (newTime.hours !== currentTime.hours) {
                    // 时变化 - 全部更新
                    typingElement.textContent = newTime.full;
                }
                
                currentTime = newTime;
            }, 1000);
        }

        // 启动打字机特效 - 左上角（循环文字）
        function startTypedLeft() {
            var typed = new Typed('.typing-topleft', {
                strings: ["MIKU", "HATSUNE"],
                loop: true,
                typeSpeed: 65,
                backSpeed: 65,
                showCursor: true,
                cursorChar: '|',
                typeCssClass: 'typed-text'
            });
        }
    </script>
</body>
</html>
