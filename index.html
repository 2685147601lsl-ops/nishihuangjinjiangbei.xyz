<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>^-^</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- External Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>

<body>
    <!-- 预加载动画 (Preloader) -->
    <div class="preloader" id="preloader">
        <div class="loader-content">
            <div class="loader-line"></div>
            <div class="loader-text">INITIALIZTING</div>
        </div>
    </div>

    <!-- GSAP FLIP 开屏动画 -->
    <div class="intro-overlay" id="introOverlay">
        <div class="intro-grid"></div>
        <div class="intro-content">
            <div class="intro-circle circle-1"></div>
            <div class="intro-circle circle-2"></div>
            <div class="intro-circle circle-3"></div>
            <div class="intro-text">WELCOME</div>
        </div>
    </div>

    <!-- 导航栏 - 左侧 Products 按钮 -->
    <div class="navbar-left">
        <button class="nav-products-btn" id="productsBtn">
            <div class="btn-text">
                <span id="btnText1">Products</span>
                <span id="btnText2">Products</span>
            </div>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 19V5M5 12l7-7 7 7" />
            </svg>
        </button>
    </div>

    <!-- 导航栏 - 右上角 -->
    <div class="navbar-right">
        <div class="nav-links">
            <a href="#nexus" class="nav-link">Nexus</a>
            <a href="#vault" class="nav-link">Vault</a>
            <a href="#prologue" class="nav-link">Prologue</a>
            <a href="#about" class="nav-link">About</a>
            <a href="#contact" class="nav-link">Contact</a>
        </div>

        <button class="audio-indicator" id="audioIndicator">
            <div class="indicator-line"></div>
            <div class="indicator-line"></div>
            <div class="indicator-line"></div>
            <div class="indicator-line"></div>
        </button>

        <!-- 背景轻音乐（可替换 src 为你自己的音频，比如 assets/bgm.mp3） -->
        <audio id="bgMusic" loop>
            <source src="https://assets.mixkit.co/music/preview/mixkit-beautiful-dream-493.mp3" type="audio/mpeg">
        </audio>
    </div>

    <!-- 雨滴效果 Canvas -->
    <canvas id="raindropCanvas" class="raindrop-canvas"></canvas>

    <!-- Products 面板 -->
    <div class="products-panel" id="productsPanel">
        <div class="products-container">
            <h2 class="products-title">OUR SERVICES</h2>
            <p class="products-subtitle">Explore our API solutions</p>
            <div class="products-grid">
                <!-- Grok2API -->
                <a href="https://grok.nishihuangjinjiangbei.xyz/" target="_blank" class="product-card" id="cardGrok">
                    <div class="product-card-glow"></div>
                    <div class="product-icon">
                        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="1.5" opacity="0.3" />
                            <path d="M16 20L24 12L32 20" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" />
                            <path d="M24 12V32" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                            <path d="M16 28L24 36L32 28" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" />
                            <circle cx="24" cy="24" r="4" fill="currentColor" opacity="0.4" />
                        </svg>
                    </div>
                    <div class="product-info">
                        <h3 class="product-name">Grok2API</h3>
                        <p class="product-desc">xAI Grok model API proxy service</p>
                    </div>
                    <div class="product-arrow">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M7 17L17 7M17 7H7M17 7V17" />
                        </svg>
                    </div>
                </a>

                <!-- GCLI2API -->
                <a href="https://gcli.nishihuangjinjiangbei.xyz/" target="_blank" class="product-card" id="cardGcli">
                    <div class="product-card-glow"></div>
                    <div class="product-icon">
                        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect x="8" y="8" width="32" height="32" rx="6" stroke="currentColor" stroke-width="1.5"
                                opacity="0.3" />
                            <path d="M16 20L22 26L16 32" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                                stroke-linejoin="round" />
                            <path d="M26 32H34" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
                            <circle cx="34" cy="14" r="3" fill="currentColor" opacity="0.3" />
                        </svg>
                    </div>
                    <div class="product-info">
                        <h3 class="product-name">GCLI2API</h3>
                        <p class="product-desc">Gemini CLI to API bridge service</p>
                    </div>
                    <div class="product-arrow">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M7 17L17 7M17 7H7M17 7V17" />
                        </svg>
                    </div>
                </a>

                <!-- CLI Proxy API -->
                <a href="https://codex.nishihuangjinjiangbei.xyz/management.html" target="_blank" class="product-card"
                    id="cardProxy">
                    <div class="product-card-glow"></div>
                    <div class="product-icon">
                        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="24" cy="24" r="18" stroke="currentColor" stroke-width="1.5" opacity="0.3" />
                            <path d="M18 18L14 24L18 30" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                                stroke-linejoin="round" />
                            <path d="M30 18L34 24L30 30" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                                stroke-linejoin="round" />
                            <path d="M27 16L21 32" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                        </svg>
                    </div>
                    <div class="product-info">
                        <h3 class="product-name">CLI Proxy API</h3>
                        <p class="product-desc">Codex CLI proxy management panel</p>
                    </div>
                    <div class="product-arrow">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M7 17L17 7M17 7H7M17 7V17" />
                        </svg>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <!-- 视频背景 -->
    <div class="video-background">
        <video autoplay muted loop playsinline>
            <source src="assets/background.mp4" type="video/mp4">
            您的浏览器不支持视频标签。
        </video>
    </div>

    <!-- 打字机特效 - 左上角 -->
    <div class="typing-topleft-container">
        <span class="typing-topleft"></span>
    </div>

    <!-- 打字机特效 - 右下角（时间） -->
    <div class="typing-container">
        <span class="typing"></span>
    </div>

    <!-- Raindrop FX -->
    <script src="js/raindrop-fx.js"></script>
    <!-- Main Logic -->
    <script src="js/main.js"></script>
</body>

</html>
